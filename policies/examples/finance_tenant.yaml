name: finance_tenant
version: "1.0.0"
description: Policy set for financial services tenants with regulatory requirements.
tenant_id: finance-org
rules:
  - id: block-investment-advice
    description: Block outputs that could be construed as investment advice
    scope: tenant
    condition:
      topic: investment_advice
    decision: deny
    priority: 1

  - id: require-disclaimer
    description: Require financial disclaimer in all customer-facing outputs
    scope: channel
    condition:
      channel: customer_facing
      has_disclaimer: false
    decision: warn
    priority: 10

  - id: high-value-transaction-approval
    description: Require human approval for transactions over $10,000
    scope: tenant
    condition:
      action: "refund_approval"
      amount:
        $gt: 10000
    decision: escalate
    priority: 5
